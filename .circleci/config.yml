version: 2.1
jobs:
  build:
    working_directory: ~/dotfiles
    docker:
      - image: cimg/python:3.9
    steps:
      - checkout
      - setup_remote_docker
      - run:
          name: Build Docker image
          command: docker build --tag dotfiles .
      - run:
          name: Run bootstrap.sh and verify outcomes
          command: |
            docker run dotfiles bash -c '
              set -euo pipefail
              ./bootstrap.sh
              test -L "$HOME/.zshrc"
              test -L "$HOME/.tmux.conf"
              test -L "$HOME/.config/nvim"
              readlink "$HOME/.zshrc" | grep -q dotfiles/.zshrc
              readlink "$HOME/.config/nvim" | grep -q dotfiles/nvim
            '

workflows:
  build_and_test:
    jobs:
      - build
