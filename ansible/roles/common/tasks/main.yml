---
- name: Ensure base packages are present (apt/brew best-effort)
  ansible.builtin.package:
    name: [git, curl, wget]
    state: present
  ignore_errors: true
  become: true

- name: Ensure uv is installed
  ansible.builtin.shell:
    cmd: |
      set -euo pipefail
      curl -LsSf https://astral.sh/uv/install.sh | sh
    executable: /bin/bash
    creates: "{{ ansible_env.HOME }}/.local/bin/uv"
  become: false
  tags: ['python', 'uv']

- name: Install pynvim via uv
  ansible.builtin.shell:
    cmd: uv tool install pynvim
    executable: /bin/bash
  environment:
    PATH: "{{ ansible_env.HOME }}/.local/bin:{{ ansible_env.PATH }}"
  register: pynvim_install
  changed_when: "'Installed' in pynvim_install.stdout or 'installed' in pynvim_install.stdout"
  become: false
  tags: ['python', 'pynvim']

- name: Create stowable dirs
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.config"
    state: directory
    mode: '0755'
